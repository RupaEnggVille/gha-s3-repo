<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to GitHub Actions Deployment</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, Helvetica, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            text-align: center;
            max-width: 600px;
        }

        h1 {
            color: #ff9900;
        }

        p {
            color: #555;
            line-height: 1.6;
        }

        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 25px;
            background: #ff9900;
            color: white;
            text-decoration: none;
            border-radius: 5px;
        }

        .btn:hover {
            background: #e68a00;
        }

        footer {
            margin-top: 30px;
            color: gray;
            font-size: 14px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>🎉 Welcome to GitHub Actions Auto Deployment</h1>

        <p>
            This website is hosted using <strong>Amazon S3 Static Website Hosting</strong>.
        </p>

        <p>
            You have successfully deployed your HTML page to an S3 bucket using GitHub Actions.
        </p>

        <a href="https://aws.amazon.com/s3/" class="btn" target="_blank">
            Learn More About Amazon S3
        </a>

        <footer>
            <p>Hosted on Amazon S3 | © 2026</p>
        </footer>
    </div>

</body>
</html>
